<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Proyecto Medioambiental</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #00b894;
            --accent: #55efc4;
            --bg: #f0f3f7;
            --text: #2d3436;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body { 
            display: flex; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh; 
            overflow: hidden; 
        }
        
        nav { 
            width: 320px; 
            padding: 40px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        nav h2 { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: #b2bec3; 
            margin-bottom: 50px;
        }

        nav ul { list-style: none; padding: 0; }
        nav li { margin: 25px 0; }

        nav a { 
            color: #636e72; 
            text-decoration: none; 
            font-size: 1.1rem; 
            font-weight: 500;
            transition: all 0.4s ease;
            display: inline-block;
        }

        nav a:hover { color: var(--primary); transform: translateX(10px); }

        main { 
            flex-grow: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        section { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 50px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            height: 85vh;
            overflow-y: auto;
        }

        /* Estilo para el contenido inyectado */
        h1 { color: #2d3436; font-weight: 800; }
        .content-box { background: white; padding: 30px; border-radius: 20px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <nav>
        <h2>Índice Proyecto</h2>
        <ul>
            <li><a href="index.html">🏠 Inicio</a></li>
            <li><a href="contaminacion.html">🏭 Contaminación</a></li>
            <li><a href="residuos.html">♻️ Residuos</a></li>
            <li><a href="obsolescencia.html">📉 Obsolescencia</a></li>
            <li><a href="ecologica.html">💻🌿 Inf. Ecológica</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <!-- AQUÍ SE CARGARÁ EL CONTENIDO DE CADA ARCHIVO -->
            {{ content }}
        </section>
    </main>

</body>
</html>
